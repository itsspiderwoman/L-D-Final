<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Me & Leah ❤️</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
  background: linear-gradient(135deg, #ff4d88, #6a11cb);
  text-align: center;
}

/* TAP SCREEN */
#tapScreen {
  font-size: 40px;
  padding: 25px 40px;
  border: 2px solid white;
  border-radius: 20px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  transition: 0.3s;
  z-index: 5;
}

#tapScreen:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #ff4d88;
}

/* MAIN CONTENT */
#content {
  display: none;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.4);
  padding: 25px;
  border-radius: 20px;
  max-width: 700px;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* POLAROIDS */
.polaroid-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 20px;
}

.polaroid {
  background: white;
  padding: 10px 10px 25px 10px;
  width: 180px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  transform: rotate(-2deg);
  transition: 0.3s;
}

.polaroid:nth-child(2) { transform: rotate(3deg); }
.polaroid:nth-child(3) { transform: rotate(-4deg); }

.polaroid:hover {
  transform: scale(1.05) rotate(0deg);
}

.polaroid img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.polaroid p {
  margin: 10px 0 0;
  font-size: 14px;
  color: #333;
}

/* LOVE TEXT */
h1 {
  margin-top: 15px;
  font-size: 28px;
}

/* FLOATING HEARTS */
.heart {
  position: absolute;
  color: pink;
  font-size: 20px;
  animation: float 5s linear infinite;
}

/* LIGHT ORB EFFECT */
.light {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: glow 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

@keyframes glow {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}
</style>
</head>

<body>

<!-- TAP -->
<div id="tapScreen">Tap ❤️</div>

<!-- CONTENT -->
<div id="content">

  <div class="card">

   <div class="polaroid-container">

  <div class="polaroid">
    <img src="./leah.jpg.jpeg" alt="Leah">
    <p>Leah ❤️</p>
  </div>

  <div class="polaroid">
    <img src="./leah1.jpg.jpeg" alt="Leah 1">
    <p>Us 💕</p>
  </div>

  <div class="polaroid">
    <img src="./leah2.jpg.jpeg" alt="Leah 2">
    <p>Memories ✨</p>
  </div>

</div>
    </div>

    <h1>I love you so much baby ❤️</h1>

  </div>

</div>

<script>

document.getElementById("tapScreen").onclick = function() {

  document.getElementById("tapScreen").style.display = "none";
  document.getElementById("content").style.display = "block";

  /* HEARTS */
  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }

  /* LIGHTS */
  for (let i = 0; i < 30; i++) {
    let light = document.createElement("div");
    light.className = "light";

    light.style.left = Math.random() * 100 + "vw";
    light.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(light);

    setTimeout(() => light.remove(), 8000);
  }
};

</script>

</body>
</html>
